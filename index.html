<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipartite Graph Analyzer | ADMC Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Cytoscape for premium graph visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <!-- Bipartite layout extension -->
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
            </div>
            <h1>Bipartite Graph Analyzer</h1>
        </div>
        <div class="header-actions">
            <button id="run-btn" title="Analyze Graph">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m10 2 6 6-6 6"/><path d="M2 12a10 10 0 1 1 10 10l-4-2"/></svg>
                Analyze Graph
            </button>
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <div class="input-section">
                <h3 class="section-title">Graph Definition</h3>
                <div class="input-group">
                    <label for="edges-input" style="font-size: 0.75rem; color: var(--text-muted);">Edges (Comma separated, e.g. A,B)</label>
                    <textarea id="edges-input" placeholder="A,B&#10;B,C&#10;C,D&#10;D,A" spellcheck="false"></textarea>
                </div>
                <div class="examples-section" style="margin-top: 1.5rem;">
                    <h3 class="section-title">Presets</h3>
                    <div class="examples-grid">
                        <button class="btn-secondary example-btn" data-example="square">Square</button>
                        <button class="btn-secondary example-btn" data-example="triangle">Triangle</button>
                        <button class="btn-secondary example-btn" data-example="star">Star</button>
                        <button class="btn-secondary example-btn" data-example="complex">Complex</button>
                    </div>
                </div>
            </div>

            <div class="config-section" style="margin-top: auto;">
                <h3 class="section-title">Controls</h3>
                <button id="reset-btn" class="btn-secondary" style="width: 100%;">
                    Reset Canvas
                </button>
            </div>
        </aside>

        <section class="canvas-container">
            <div id="cy" style="width: 100%; height: 100%;"></div>
            <div class="canvas-overlay">
                <div class="legend">
                    <div class="legend-item">
                        <span class="dot" style="background: var(--node-a);"></span>
                        <span>Set A</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot" style="background: var(--node-b);"></span>
                        <span>Set B</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot" style="background: var(--text-muted);"></span>
                        <span>Unvisited / Conflict</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="algo-panel">
            <h3 class="section-title">Algorithm Result</h3>
            <div class="status-card">
                <div id="status-text" style="font-weight: 600;">Ready to analyze</div>
                <div id="status-badge" class="status-badge status-pending">WAITING</div>
            </div>

            <div class="sets-display" id="sets-container" style="display: none;">
                <div class="set-box">
                    <div style="font-size: 0.7rem; color: var(--node-a); font-weight: 700;">SET A</div>
                    <div id="set-a-nodes" style="font-size: 0.8rem;"></div>
                </div>
                <div class="set-box" style="margin-top: 8px;">
                    <div style="font-size: 0.7rem; color: var(--node-b); font-weight: 700;">SET B</div>
                    <div id="set-b-nodes" style="font-size: 0.8rem;"></div>
                </div>
            </div>

            <h3 class="section-title" style="margin-top: 1rem;">Process Trace</h3>
            <div class="trace-log" id="trace-log">
                <div class="trace-line">Waiting for input...</div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
